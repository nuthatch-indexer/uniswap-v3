[view.global]
description = "One-row network summary: pools, distinct tokens, total swaps/mints/burns, and pools-with-swaps. The header-panel numbers, all from one factory rule and a handful of SQL views."

[view.pool_stats]
description = "Per-pool activity + latest price: swap/mint/burn counts and the most recent swap price for each pool, joined to its pair and fee. The 'which pools are busy' dashboard row."

[view.pool_volume]
description = "Per-pool gross volume — sum(abs(amount0_dec)) / sum(abs(amount1_dec)) over the signed int256 swap amounts, in raw units. The metric the Uniswap subgraph publishes as volumeToken0/1, here a plain SUM over exact on-chain values."

[view.pools]
description = "The pool registry — one row per pool the factory created (token pair, fee tier, tick spacing, creation block). One factory rule discovers every row; the spine the other views join on."

[view.swaps]
description = "Every swap across every pool, joined to its token pair, with the post-swap price derived from sqrtPriceX96 (price = (sqrtPriceX96/2^96)^2, token1 per token0, raw units). `tick` is the post-swap tick."

[view.tokens]
description = "Every token that appears in a pool, ranked by how many pools reference it (WETH/USDC sit at the top). Token symbol/decimals need a contract call and are not indexed by the declarative core — join a vendored token list for labels."
